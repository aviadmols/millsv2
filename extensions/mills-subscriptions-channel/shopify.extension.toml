# Sales Channel extension (D17). Registering the app as a Sales Channel is the
# ONLY way to make system-created orders appear under the app's native Channel
# column in Shopify Admin — a custom `source_name` alone does not (this is the
# engine's proven precedent). Deploy with `shopify app deploy`.

api_version = "2026-07"

[[extensions]]
type = "sales_channel"
handle = "mills-subscriptions"
name = "Mills Subscriptions"

  [extensions.buildable]
  # Pure marketplace/channel registration — no build step.

  [extensions.capabilities]
  subscriptions = true

  [extensions.requirements]
  merchant_of_record = "merchant"

  [[extensions.countries]]
  code = "IL"
